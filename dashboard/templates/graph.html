
<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Sensor Graph</title>
</head>

<body>

<h2>Live Graphs -Temperature ,pH ,Turbidity</h2>
<h3>Quick Time Range</h3>

<button onclick="lastMinutes(5)">Last 5 Minutes</button>
<button onclick="lastMinutes(30)">Last 30 Minutes</button>
<button onclick="lastMinutes(60)">Last 1 Hour</button>
<button onclick="todayData()">Today</button>

<br><br>
<label>Start Date:</label>
<input type="date" id="startDate">

<label>Start Time:</label>
<input type="time" id="startTime">

<br><br>

<label>End Date:</label>
<input type="date" id="endDate">

<label>End Time:</label>
<input type="time" id="endTime">

<br><br>

<button onclick="loadData()">Show Graph</button>

<br><br>
<h2>Temperature Graph</h2>
<canvas id="tempChart"></canvas>

<br><br>

<h2>pH Graph</h2>
<canvas id="phChart"></canvas>

<br><br>

<h2>Turbidity Graph</h2>
<canvas id="turbidityChart"></canvas>


<br><br>


<script>
function formatDate(date){

    let year = date.getFullYear();
    let month = String(date.getMonth()+1).padStart(2,'0');
    let day = String(date.getDate()).padStart(2,'0');

    let hours = String(date.getHours()).padStart(2,'0');
    let minutes = String(date.getMinutes()).padStart(2,'0');

    return {
        date: `${year}-${month}-${day}`,
        time: `${hours}:${minutes}`
    }
}

function lastMinutes(mins){

    let now = new Date();
    let past = new Date(now.getTime() - mins*60000);

    let start = formatDate(past);
    let end = formatDate(now);

    document.getElementById("startDate").value = start.date;
    document.getElementById("startTime").value = start.time;

    document.getElementById("endDate").value = end.date;
    document.getElementById("endTime").value = end.time;

    loadData();
}

function todayData(){

    let now = new Date();

    let start = formatDate(new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0));
    let end = formatDate(now);

    document.getElementById("startDate").value = start.date;
    document.getElementById("startTime").value = start.time;

    document.getElementById("endDate").value = end.date;
    document.getElementById("endTime").value = end.time;

    loadData();
}
const ctx = document.getElementById('tempChart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Temperature',
            data: [],
            borderWidth: 2
        }]
    },
    options: {
    scales: {
        x: {
            ticks: {
                maxTicksLimit: 10
            }
        }
    }
}
});

const phCtx = document.getElementById('phChart').getContext('2d');

const phChart = new Chart(phCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'pH',
            data: [],
            borderWidth: 2
        }]
    },
    options: {
    scales: {
        x: {
            ticks: {
                maxTicksLimit: 10
            }
        }
    }
}
});

const turbCtx = document.getElementById('turbidityChart').getContext('2d');

const turbChart = new Chart(turbCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Turbidity',
            data: [],
            borderWidth: 2
        }]
    },
    options: {
    scales: {
        x: {
            ticks: {
                maxTicksLimit: 10
            }
        }
    }
}
});

function loadData(){

    let startDate = document.getElementById("startDate").value;
    let startTime = document.getElementById("startTime").value;
    let endDate = document.getElementById("endDate").value;
    let endTime = document.getElementById("endTime").value;

    let url = "/data/";

    console.log("Start Date:", startDate, "Start Time:", startTime);
    console.log("End Date:", endDate, "End Time:", endTime);

    if(startDate && startTime && endDate && endTime){
        let start = `${startDate}T${startTime}:00`;
        let end = `${endDate}T${endTime}:00`;
        url += `?start=${start}&end=${end}`;
        console.log("Fetching URL:", url);
    } else {
        console.log("Some fields are missing, fetching all data");
    }

    fetch(url)
    .then(response => response.json())
    .then(data => {
        console.log("Data received:", data);
        chart.data.labels = data.labels;
        chart.data.datasets[0].data = data.temps;
        phChart.data.labels = data.labels;
        phChart.data.datasets[0].data = data.ph;

        turbChart.data.labels = data.labels;
        turbChart.data.datasets[0].data = data.turbidity;

        chart.update();
        phChart.update();
        turbChart.update();

        
    // SHOW ALERT
   if(data.alert && data.alert !== lastAlert){
    alert(data.alert);
    lastAlert = data.alert;
}

    })
    .catch(error => console.error('Error fetching data:', error));
}
let lastAlert = null;
loadData();
setInterval(loadData, 5000);//refreshes graph every 5 secs without pressing button...Automatic refresh

</script>




</body>
</html>
